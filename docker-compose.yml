version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nkuku_db
      POSTGRES_USER: nkuku_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nkuku_user -d nkuku_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nkuku_internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nkuku_internal
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://nkuku_user:dev_password_change_me@postgres:5432/nkuku_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: ${API_PORT:-3001}
      HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_min_64_chars_long_for_dev_only}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      OWNER_EMAIL: ${OWNER_EMAIL:-owner@nkuku.local}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-change_me}
    volumes:
      - ./apps/api/src:/app/src:ro
      - ./apps/api/prisma:/app/prisma:ro
      - ./apps/api/tests:/app/tests:ro
      - ./apps/api/vitest.config.ts:/app/vitest.config.ts:ro
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "30001:3001"
    networks:
      - nkuku_internal
      - nkuku_public
    restart: unless-stopped
    command: ["sh", "-c", "npx prisma migrate deploy && npx prisma db seed && pnpm run dev"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      - ./apps/web/src:/app/src:ro
      - ./apps/web/tsconfig.json:/app/tsconfig.json:ro
      - ./apps/web/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./apps/web/postcss.config.js:/app/postcss.config.js:ro
      - ./apps/web/next.config.js:/app/next.config.js:ro
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    ports:
      - "30000:3000"
    networks:
      - nkuku_public
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "30080:80"
    depends_on:
      - api
      - web
    networks:
      - nkuku_public
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  web_node_modules:

networks:
  nkuku_internal:
  nkuku_public:
