# ============================================================
# ISPConfig Nginx Directives for nkuku.deeztechnology.solutions
# Paste into: Sites > nkuku.deeztechnology.solutions > Options > nginx Directives
# ============================================================

# ── Proxy timeouts ─────────────────────────
proxy_connect_timeout       600s;
proxy_send_timeout          600s;
proxy_read_timeout          600s;
send_timeout                600s;

# ── Upstream definitions ─────────────────────
upstream nkuku_api {
    server 127.0.0.1:30001;
    keepalive 32;
}

upstream nkuku_web {
    server 127.0.0.1:30000;
    keepalive 32;
}

# ── API routes (must come BEFORE the catch-all location / ) ──
location /api {
    proxy_pass         http://nkuku_api;
    proxy_http_version 1.1;

    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;
    proxy_set_header   Connection         "";

    # WebSocket support (for future real-time features)
    proxy_set_header   Upgrade            $http_upgrade;
    proxy_set_header   Connection         "upgrade";

    # Buffer settings for API responses
    proxy_buffering    off;
    proxy_cache        off;
}

# ── Next.js static assets (cache aggressively) ──
location /_next/static {
    proxy_pass         http://nkuku_web;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

    expires            365d;
    add_header         Cache-Control "public, immutable";
}

# ── Web app (Next.js) ──────────────────────
location / {
    proxy_pass         http://nkuku_web;
    proxy_http_version 1.1;

    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;
    proxy_set_header   Connection         "";

    # WebSocket support for Next.js HMR / dev mode
    proxy_set_header   Upgrade            $http_upgrade;
    proxy_set_header   Connection         "upgrade";
}
